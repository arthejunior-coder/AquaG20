{% extends "rotas/_layout.html" %}
{% block title %}Rotas — AquaG20{% endblock %}

{% block rotas_content %}
<div class="flex items-center justify-between mb-4">
    <h1 class="text-xl font-semibold text-slate-900">Rotas</h1>
</div>

<div class="card p-4 mb-4">
    <form class="flex flex-wrap gap-3 items-end"
          hx-get="{{ url_for('rotas.lista') }}"
          hx-trigger="change, keyup changed delay:300ms"
          hx-target="#tabela-container"
          hx-swap="innerHTML"
          hx-push-url="true">
        <div class="min-w-[180px]">
            <label class="form-label" for="status">Status</label>
            <select id="status" name="status" class="form-input">
                <option value="">Todos</option>
                {% for v, label in statuses %}
                    <option value="{{ v }}" {% if v == status_filter %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="min-w-[180px]">
            <label class="form-label" for="data">Data</label>
            <input type="date" id="data" name="data" value="{{ data_filter }}" class="form-input"/>
        </div>
    </form>
</div>

<div id="tabela-container">
    {% include "rotas/_tabela.html" %}
</div>
{% endblock %}
