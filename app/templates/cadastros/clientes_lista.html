{% extends "cadastros/_layout.html" %}
{% block title %}Clientes — AquaG20{% endblock %}

{% block cadastros_content %}
<div class="flex items-center justify-between mb-4">
    <h1 class="text-xl font-semibold text-slate-900">Clientes</h1>
    <a href="{{ url_for('cadastros.novo_cliente') }}" class="btn-primary">Novo cliente</a>
</div>

<div class="card p-4 mb-4">
    <input type="search" name="q" value="{{ q }}"
           class="form-input"
           hx-get="{{ url_for('cadastros.lista_clientes') }}"
           hx-trigger="keyup changed delay:300ms, search"
           hx-target="#tabela-container"
           hx-swap="innerHTML"
           hx-push-url="true"
           placeholder="Buscar por nome ou CPF/CNPJ..." />
</div>

<div id="tabela-container">
    {% include "cadastros/_tabela_clientes.html" %}
</div>
{% endblock %}
