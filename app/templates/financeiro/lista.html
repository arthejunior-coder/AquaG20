{% extends "financeiro/_layout.html" %}
{% block title %}Lançamentos — AquaG20{% endblock %}

{% block financeiro_content %}
<div class="flex items-center justify-between mb-4">
    <h1 class="text-xl font-semibold text-slate-900">Lançamentos</h1>
</div>

<div class="card p-4 mb-4">
    <form class="flex flex-wrap gap-3 items-end"
          hx-get="{{ url_for('financeiro.lista_lancamentos') }}"
          hx-trigger="change"
          hx-target="#tabela-container"
          hx-swap="innerHTML"
          hx-push-url="true">
        <div class="min-w-[180px]">
            <label class="form-label" for="natureza">Natureza</label>
            <select id="natureza" name="natureza" class="form-input">
                <option value="">Todas</option>
                {% for v, label in naturezas %}
                    <option value="{{ v }}" {% if v == natureza_filter %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="min-w-[180px]">
            <label class="form-label" for="status">Status</label>
            <select id="status" name="status" class="form-input">
                <option value="">Todos</option>
                {% for v, label in statuses %}
                    <option value="{{ v }}" {% if v == status_filter %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
    </form>
</div>

<div id="tabela-container">
    {% include "financeiro/_tabela.html" %}
</div>
{% endblock %}
